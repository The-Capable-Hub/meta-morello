header:
  version: 11
  includes:
    - base.yml
machine: morello-fvp

local_conf_header:
    testimage-config: |

        LICENSE_FLAGS_ACCEPTED:append = " Arm-FVP-EULA"

        TESTIMAGE_AUTO = "1"

        IMAGE_CLASSES:append = " testimage"
        INHERIT             += "fvpboot"

        TEST_TARGET = "OEFVPSerialTarget"
        TEST_SUITES = "linuxboot"

        FVP_CONSOLES[default] = "terminal_uart_ap"
target:
  - core-image-minimal