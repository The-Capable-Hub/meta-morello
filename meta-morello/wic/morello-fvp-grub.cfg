set debug="loader,mm"
set term="vt100"
set default="1"
set timeout="5"

menuentry 'BusyBox Morello Platform (Device Tree) : a64 + c64 sysroot' {
    devicetree /morello-fvp.dtb
    linux /Image \
        acpi=off \
        debug \
        earlycon=pl011,0x2A400000 \
        ip=dhcp \
        root=PARTUUID=70ead9cb-4d31-4ffa-8127-7cc8c720eaa8 \
}

menuentry 'BusyBox Morello Platform (ACPI) : a64 + c64 sysroot' {
    linux /Image \
        acpi=force \
        debug \
        earlycon=pl011,0x2A400000 \
        ip=dhcp \
        root=PARTUUID=70ead9cb-4d31-4ffa-8127-7cc8c720eaa8 \
}

menuentry 'BusyBox Morello Platform (Device Tree): initramfs pure c64' {
    devicetree /morello-fvp.dtb
    linux /Image \
        acpi=off \
        debug \
        earlycon=pl011,0x2A400000 \
        ip=dhcp \
        root=PARTUUID=70ead9cb-4d31-4ffa-8127-7cc8c720eaa8 \

    initrd /initramfs
}