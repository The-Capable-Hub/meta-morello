BBPATH .= ":${LAYERDIR}"

BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
	        ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS                     += "meta-morello-toolchain"
BBFILE_PATTERN_meta-morello-toolchain  := "^${LAYERDIR}/"
BBFILE_PRIORITY_meta-morello-toolchain  = "5"

LAYERDEPENDS_meta-morello-toolchain = " \
    core \
"
LAYERSERIES_COMPAT_meta-morello-toolchain = "kirkstone"

MORELLO_ARCH       ??= "c64"
TOOLCHAIN          ??= "gnu"
MORELLO_TOOLCHAIN  ??= "gcc-morello"

LLVM_SHARED_SOURCE ??= "${TMPDIR}/work-shared/${MACHINE}/llvm-morello-source"

require conf/compiler/gcc-morello.conf
require conf/compiler/llvm-morello.conf